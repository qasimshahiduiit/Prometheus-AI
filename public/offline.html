<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1B3A35" />
    <title>Offline · Prometheus-AI</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; box-sizing: border-box; }
      body {
        min-height: 100vh; min-height: 100dvh;
        display: grid; place-items: center; text-align: center; padding: 2rem;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: radial-gradient(120% 120% at 50% 0%, #21443D 0%, #0F2420 72%);
        color: #F5F0E8;
      }
      .wrap { max-width: 26rem; }
      .flame { width: 84px; height: 84px; margin: 0 auto 1.5rem; display: block; }
      h1 {
        font-family: Georgia, 'Times New Roman', serif; font-weight: 600;
        font-size: 1.9rem; letter-spacing: .02em; color: #E2B87A; margin-bottom: .6rem;
      }
      p { color: rgba(245, 240, 232, .7); line-height: 1.7; font-weight: 300; }
      button {
        margin-top: 1.6rem; padding: .7rem 1.6rem; border: 1px solid rgba(196, 146, 74, .4);
        background: transparent; color: #E2B87A; border-radius: 2px; font-size: .95rem;
        cursor: pointer; transition: background .2s ease;
      }
      button:hover { background: rgba(196, 146, 74, .12); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img class="flame" src="/icon-512.png" width="84" height="84" alt="Prometheus-AI" />
      <h1>You&rsquo;re offline</h1>
      <p>Prometheus needs a connection to think. Check your network and try again — your conversations are safe.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
